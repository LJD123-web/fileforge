<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileForge — AI 文件转换与编辑工具</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Inline critical above-fold styles fallback */
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #EEF4F8; }
    .app-root { width: 100%; height:100vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  </style>
</head>
<body>

<div class="app-root">

  <!-- ====== 背景光晕 ====== -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>
  <canvas id="particles-canvas"></canvas>

  <!-- ====== 顶部导航 ====== -->
  <header class="top-nav">
    <div class="nav-brand">
      <div class="logo-icon">
        <i class="fas fa-bolt"></i>
      </div>
      <span class="brand-name">FileForge</span>
    </div>

    <div class="nav-tabs">
      <button class="capsule-tab active" data-view="convert">
        <i class="fas fa-exchange-alt"></i><span>文件转换</span>
      </button>
      <button class="capsule-tab" data-view="edit">
        <i class="far fa-file-edit"></i><span>文档编辑</span>
      </button>
      <button class="capsule-tab" data-view="history">
        <i class="far fa-clock"></i><span>历史记录</span>
      </button>
    </div>

    <div class="nav-actions">
      <div class="settings-drop" id="settings-drop">
        <button class="icon-btn" id="settings-toggle" title="设置">
          <i class="fas fa-cog"></i>
        </button>
        <div class="drop-menu" id="settings-menu">
          <button class="drop-item" data-action="theme"><i class="fas fa-moon"></i> 主题切换</button>
          <button class="drop-item" data-action="output"><i class="fas fa-folder-open"></i> 输出目录</button>
          <button class="drop-item" data-action="shortcuts"><i class="fas fa-keyboard"></i> 快捷键</button>
          <button class="drop-item drop-danger" data-action="reset"><i class="fas fa-undo"></i> 重置应用</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ====== 主内容区 ====== -->
  <main class="main-content">

    <!-- 视图：文件转换 -->
    <div class="view-panel active" id="view-convert">

      <!-- 左侧：最近文件 -->
      <aside class="side-panel left-panel">
        <div class="panel-header">
          <h3>最近文件</h3>
          <button class="text-btn" id="clear-recent">清空</button>
        </div>
        <div class="recent-files" id="recent-files">
          <div class="history-empty">暂无最近文件</div>
        </div>
      </aside>

      <!-- 中间：转换区 -->
      <div class="center-area">
        <div class="hero-section">
          <p>拖拽文件到下方，或点击上传区域</p>
        </div>

        <!-- 上传区 -->
        <div class="upload-zone" id="upload-zone">
          <div class="upload-icon-circle">
            <i class="fas fa-cloud-upload-alt"></i>
          </div>
          <div class="upload-text-block">
            <p class="upload-text">支持 PDF、Word、Excel、图片等格式</p>
            <p class="upload-hint">单文件最大 100MB</p>
          </div>
        </div>
        <input type="file" id="file-input" hidden>

        <!-- 文件信息卡片 -->
        <div class="file-info-card" id="file-info" style="display:none">
          <div class="fi-left">
            <i class="fas fa-file fi-file-icon"></i>
            <div class="fi-detail">
              <span class="fi-name" id="fi-name"></span>
              <span class="fi-meta">
                <span id="fi-type"></span> · <span id="fi-size"></span>
              </span>
            </div>
          </div>
          <button class="icon-btn remove-btn" id="remove-file" style="display:none" title="移除文件">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <!-- 格式选择 -->
        <div class="format-section">
          <h4>选择目标格式</h4>
          <div class="format-chips">
            <button class="format-chip selected" data-format="png">PNG图片</button>
            <button class="format-chip" data-format="jpeg">JPEG图片</button>
            <button class="format-chip" data-format="webp">WebP图片</button>
            <button class="format-chip" data-format="csv">CSV</button>
            <button class="format-chip" data-format="json">JSON</button>
            <button class="format-chip" data-format="md">Markdown</button>
            <button class="format-chip" data-format="html">HTML</button>
            <button class="format-chip" data-format="txt">纯文本</button>
            <button class="format-chip" data-format="docx">Word</button>
            <button class="format-chip" data-format="pdf">PDF</button>
          </div>

          <!-- 质量滑块（图片用） -->
          <div class="quality-row" id="quality-row">
            <span>图片质量</span>
            <input type="range" id="quality-slider" min="10" max="100" value="90">
            <span id="quality-value">90%</span>
          </div>

          <button class="convert-btn" id="convert-btn">
            <i class="fas fa-magic"></i>开始转换
          </button>
        </div>

        <!-- AI 对话区 -->
        <div class="chat-panel">
          <div class="chat-header">
            <span><i class="fas fa-robot"></i> FileForge Agent</span>
            <span class="chat-status">在线</span>
          </div>
          <div class="chat-list" id="chat-list"></div>
          <div class="chat-input-row">
            <input type="text" class="chat-input" id="chat-input" placeholder="输入消息，或直接拖文件...">
            <button class="chat-send" id="chat-send">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- 右侧：快捷操作 -->
      <aside class="side-panel right-panel">
        <div class="quick-actions-card">
          <h4>快捷操作</h4>
          <div class="quick-actions">
            <button class="quick-action" data-action="png2jpg">
              <span class="qa-icon"><i class="fas fa-image"></i></span>
              <span class="qa-title">PNG → JPEG</span>
              <span class="qa-desc">图片格式互转</span>
            </button>
            <button class="quick-action" data-action="imgcompress">
              <span class="qa-icon"><i class="fas fa-compress-arrows-alt"></i></span>
              <span class="qa-title">图片压缩</span>
              <span class="qa-desc">减小文件体积</span>
            </button>
            <button class="quick-action" data-action="csv2json">
              <span class="qa-icon"><i class="fas fa-table"></i></span>
              <span class="qa-title">CSV → JSON</span>
              <span class="qa-desc">数据格式转换</span>
            </button>
            <button class="quick-action" data-action="json2csv">
              <span class="qa-icon"><i class="fas fa-code"></i></span>
              <span class="qa-title">JSON → CSV</span>
              <span class="qa-desc">数据格式转换</span>
            </button>
            <button class="quick-action" data-action="md2html">
              <span class="qa-icon"><i class="fas fa-file-alt"></i></span>
              <span class="qa-title">Markdown → HTML</span>
              <span class="qa-desc">文档渲染</span>
            </button>
            <button class="quick-action" data-action="img2pdf">
              <span class="qa-icon"><i class="fas fa-image"></i></span>
              <span class="qa-title">图片 → PDF</span>
              <span class="qa-desc">合并生成 PDF</span>
            </button>
            <button class="quick-action" data-action="word2pdf">
              <span class="qa-icon"><i class="fas fa-file-word"></i></span>
              <span class="qa-title">Word → PDF</span>
              <span class="qa-desc">文档导出</span>
            </button>
            <button class="quick-action" data-action="word2txt">
              <span class="qa-icon"><i class="fas fa-file-word"></i></span>
              <span class="qa-title">Word 转纯文本</span>
              <span class="qa-desc">提取文本内容</span>
            </button>
          </div>
        </div>
      </aside>
    </div>

    <!-- 视图：文档编辑 -->
    <div class="view-panel" id="view-edit">
      <div class="editor-container">
        <div class="editor-header">
          <h3>Markdown 编辑器</h3>
          <div class="editor-actions">
            <button class="btn-capsule" id="md-load-file">导入 .md 文件</button>
            <input type="file" id="md-file-input" accept=".md,.txt" hidden>
            <button class="btn-capsule" id="mdExportHtml">导出 HTML</button>
            <button class="btn-capsule btn-capsule-accent" id="mdExportDocx">导出 Word</button>
            <button class="btn-capsule btn-capsule-danger" id="mdExportPdf">导出 PDF</button>
          </div>
        </div>
        <div class="editor-body">
          <textarea class="md-editor" id="md-editor" placeholder="在此编写 Markdown..."></textarea>
          <div class="md-preview" id="md-preview"></div>
        </div>
        <div class="editor-footer">
          <span id="md-wordcount">字数 0</span>
          <span id="md-charcount">字符 0</span>
        </div>
      </div>
    </div>

    <!-- 视图：历史记录 -->
    <div class="view-panel" id="view-history">
      <div class="history-container">
        <div class="history-header">
          <h3>转换历史</h3>
          <button class="text-btn" id="clear-history">清空全部</button>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">暂无转换记录</div>
        </div>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Progress Ring Overlay -->
  <div class="progress-ring-wrap" id="progress-overlay">
    <div class="progress-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle class="progress-ring-bg"/>
        <circle class="progress-ring-fill" id="progress-ring-fill"/>
      </svg>
      <div class="progress-ring-text" id="progress-text">0%</div>
    </div>
    <div class="progress-label" id="progress-label">正在转换...</div>
  </div>
</div>

<!-- Libraries (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

<!-- App modules (order matters: dependencies first) -->
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/convert.js"></script>
<script src="js/chat.js"></script>
<script src="js/md-editor.js"></script>
<script src="js/app.js"></script>

</body>
</html>
